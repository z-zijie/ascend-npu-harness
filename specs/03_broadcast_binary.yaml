schema_version: "1.0"

name: broadcast_binary
category: elementwise
target_arch: dav-2201

summary: |
  Broadcasted fused multiply-add: z = x * y + bias.
  Supports channel-wise and per-tensor broadcasting patterns common in
  normalization and scaling layers. Operates on 4D tensors in NCHW-like layout.

math:
  definition: |
    For each index (b, c, h, w):
      z[b,c,h,w] = x[b,c,h,w] * y_broadcast[c] + bias_broadcast[c]
    where y_broadcast and bias_broadcast are broadcast to match the shape of x.
  equations:
    - "z = x * y + bias"
    - "y broadcast: [1,C,1,1] -> [B,C,H,W] or [B,C,1,1] -> [B,C,H,W]"
    - "bias broadcast: [C] -> [B,C,H,W] or [1,C,1,1] -> [B,C,H,W]"
  notes:
    - "Broadcasting follows numpy/NumPy semantics along trailing dimensions"
    - "The multiply and add are fused into a single kernel launch"
    - "No intermediate tensor for x*y is materialized"

inputs:
  - name: x
    dtype: [float32, float16]
    shape: "[B, C, H, W]"
    layout: NCHW
    role: "primary input tensor"

  - name: y
    dtype: [float32, float16]
    shape: "broadcastable: [1, C, 1, 1] or [B, C, 1, 1]"
    layout: NCHW
    role: "multiplicative weight, broadcast along C"

  - name: bias
    dtype: [float32, float16]
    shape: "broadcastable: [C] or [1, C, 1, 1]"
    layout: contiguous
    role: "additive bias, broadcast along C"

outputs:
  - name: z
    dtype: [float32, float16]
    shape: "[B, C, H, W]"
    layout: NCHW

parameters: []

shape_symbols:
  B:
    description: "Batch size"
    values: [1, 2, 4]
  C:
    description: "Channel dimension"
    values: [1, 3, 16, 64]
  H:
    description: "Height"
    values: [1, 7, 32, 63]
  W:
    description: "Width"
    values: [1, 7, 32, 63]

shape_rules:
  - "input_x.shape == [B, C, H, W]"
  - "input_y.shape in {[1, C, 1, 1], [B, C, 1, 1]}"
  - "input_bias.shape in {[C], [1, C, 1, 1]}"
  - "output_z.shape == [B, C, H, W]"
  - "B >= 1, C >= 1, H >= 1, W >= 1"

dtype_rules:
  - "dtype(x) == dtype(y) == dtype(bias)"
  - "dtype(z) == dtype(x)"
  - "dtype(x) in {float32, float16}"

layout_rules:
  - "x and z are NCHW contiguous"
  - "y and bias may be compact but must be broadcast-compatible"

broadcasting:
  supported: true
  rules:
    - "y: [1,C,1,1] broadcasts over B, H, W"
    - "y: [B,C,1,1] broadcasts over H, W"
    - "bias: [C] broadcasts over B, H, W with implicit reshape to [1,C,1,1]"
    - "bias: [1,C,1,1] broadcasts over B, H, W"

masking: false

tiling:
  description: "2D tiling over the spatial dimensions H and W, with C as the inner vectorization axis"
  tile_h: 32
  tile_w: 32

implementation:
  language: AscendC
  style: "fused broadcast multiply-add kernel"
  strategy: |
    Tile the input across H and W. For each tile, broadcast y[c] and bias[c]
    along the spatial dimensions, compute x * y + bias with a fused mul-add
    instruction. Use vectorized loads/stores aligned to 32B.

accuracy:
  float32:
    abs: 1.0e-5
    rel: 1.0e-5
  float16:
    abs: 1.0e-2
    rel: 1.0e-2

performance:
  required: false
  benchmark: sanity

tests:
  deterministic_seed: 20260522
  shapes:
    - {B: 1, C: 1, H: 1, W: 1}
    - {B: 1, C: 3, H: 7, W: 7}
    - {B: 2, C: 16, H: 32, W: 32}
    - {B: 4, C: 64, H: 63, W: 63}
    - {B: 1, C: 3, H: 32, W: 64}
  edge_cases:
    - "C=1       scalar channel"
    - "H=1,W=1   spatial size 1"
    - "B=1       single batch"
    - "y broadcast shape [B,C,1,1]  per-sample weight"
    - "bias shape [C]              1D bias vector"
  invalid_cases:
    - "y shape [C,1]   wrong rank"
    - "bias shape [C,H,W]  missing batch dim"
    - "dtype mismatch between x and y"

benchmark:
  required: false
  warmup: 10
  iterations: 100

status: draft
